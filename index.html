<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Guardian: The Competition</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f0f2f5; --card: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #2d3436; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .pet-display { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        .pet-sprite { width: 120px; height: 120px; object-fit: contain; margin: 10px auto; display: block; border: 2px dashed #ddd; border-radius: 15px; }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; text-transform: uppercase; font-size: 0.7em; margin-bottom: 10px; }
        .status-happy { background: #55efc4; color: #00b894; }
        .status-tired { background: #ffeaa7; color: #fdcb6e; }
        .status-sick { background: #fab1a0; color: #e17055; }
        .status-coma { background: #a29bfe; color: #6c5ce7; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .user-card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .progress-container { background: #eee; height: 25px; border-radius: 12px; margin: 15px 0; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.8s ease-in-out; }
        .inventory-list { font-size: 0.85em; color: #636e72; min-height: 40px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .shop-box { background: #2d3436; color: white; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: center; }
        .item-btn { background: #6c5ce7; border: none; color: white; padding: 8px 12px; border-radius: 5px; cursor: pointer; margin: 5px; }
        .item-btn:hover { background: #a29bfe; }
        .item-btn:disabled { background: #555; cursor: not-allowed; opacity: 0.6; }
        button.action-btn { width: 100%; padding: 10px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center;">🐾 Note Guardians</h1>
    <h3 id="weekHeading" style="text-align:center; color: #6c5ce7;">Loading Week...</h3>

    <div class="stats-grid">
        <div class="user-card">
            <img id="petA" class="pet-sprite" src="michael/happy.png">
            <div id="badgeA" class="status-badge status-happy">Status: Happy</div>
            <h3>Michael</h3>
            <div class="progress-container"><div id="barA" class="progress-fill"></div></div>
            <p id="txtA">0 / 0 Notes (0%)</p>
            <button class="action-btn" onclick="addNote('userA')">+1 Note Completed</button>
            <p class="inventory-list" id="invA">🎒 Items: None</p>
        </div>

        <div class="user-card">
            <img id="petB" class="pet-sprite" src="jacinta/happy.png">
            <div id="badgeB" class="status-badge status-happy">Status: Happy</div>
            <h3>Jacinta</h3>
            <div class="progress-container"><div id="barB" class="progress-fill"></div></div>
            <p id="txtB">0 / 0 Notes (0%)</p>
            <button class="action-btn" onclick="addNote('userB')">+1 Note Completed</button>
            <p class="inventory-list" id="invB">🎒 Items: None</p>
        </div>
    </div>

    <div class="shop-box">
        <h3>🎁 Weekly Draft</h3>
        <p id="shopDesc">First to 100% gets to claim an item!</p>
        <div id="shopItems"></div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyAPSvmmBvpYmBcjUa1AhU3q8cIP-WlHCSwynSjWynBG6ED2bawA8DXl7fhagVdlrNu/exec";
    
    const DATABASE = {
        "Wearables": ["Tiny Sprout Hat", "Yellow Raincoat", "Star Sunglasses", "Crocheted Scarf", "Flower Crown", "Polka-Dot Bowtie", "Paper Bag Mask", "Cardboard Armor", "Angel/Devil Wings", "Pom-Pom Beanie"],
        "Toys": ["Wind-up Mouse", "Jellyfish Lamp", "Miniature Train", "Squeaky Dino", "Infinite Yarn", "Heart Bubbles", "Handheld Console", "Rocking Horse", "Star Ball", "Plushie"],
        "Snacks": ["Star Watermelon", "Firefly Honey", "Cloud Cotton Candy", "Rainbow Macaron", "Strawberry Milk", "Lucky Acorn", "Jam Cookie", "Moon-Cheese", "Sparkling Soda", "Sunflower Seed"],
        "Decor": ["Mushroom Stool", "Teacup Bed", "Terrarium Globe", "Ghost Plant", "Record Player", "Fairy Lights", "Beanbag Chair", "Polaroid", "Fuzzy Cactus", "Cloud Rug"],
        "Rare": ["Stardust", "Antique Key", "Ever-Burning Candle", "Message Bottle", "Pocket Sun", "Crystal Geode", "Phoenix Feather", "Snack Compass", "Enchanted Umbrella", "Golden Ticket"]
    };

    let gameState = {};

    async function syncData() {
        try {
            const response = await fetch(API_URL);
            gameState = await response.json();
            updateUI();
        } catch (e) { console.log("Sync failed"); }
    }

    function updateUI() {
        // Michael
        const percA = (gameState.userA.completed / gameState.userA.total) * 100 || 0;
        document.getElementById('barA').style.width = percA + "%";
        document.getElementById('txtA').innerText = `${gameState.userA.completed} / ${gameState.userA.total} (${percA.toFixed(0)}%)`;
        document.getElementById('invA').innerText = "🎒 Items: " + (gameState.userA.items || "None");
        updatePetDisplay('A', gameState.userA.status);

        // Jacinta
        const percB = (gameState.userB.completed / gameState.userB.total) * 100 || 0;
        document.getElementById('barB').style.width = percB + "%";
        document.getElementById('txtB').innerText = `${gameState.userB.completed} / ${gameState.userB.total} (${percB.toFixed(0)}%)`;
        document.getElementById('invB').innerText = "🎒 Items: " + (gameState.userB.items || "None");
        updatePetDisplay('B', gameState.userB.status);

        // Shop
        const catList = ["Wearables", "Toys", "Snacks", "Decor", "Rare"];
        const currentCat = catList[(gameState.week - 1) % 5];
        document.getElementById('weekHeading').innerText = `Week ${gameState.week}: ${currentCat}`;
        renderShop(currentCat);
    }

    function updatePetDisplay(id, status) {
        const sprite = document.getElementById('pet' + id);
        const badge = document.getElementById('badge' + id);
        const folder = (id === 'A') ? 'michael' : 'jacinta';
        sprite.src = `images/${folder}/${status}.png`;
        badge.innerText = "Status: " + status;
        badge.className = "status-badge status-" + status;
    }

    function renderShop(category) {
        const items = DATABASE[category].slice(0, 3);
        let html = "";
        items.forEach(item => {
            const isSold = (gameState.soldOut === item);
            const btnText = isSold ? `${item} (Claimed!)` : item;
            const disabled = isSold ? "disabled" : "";
            html += `<button class="item-btn" ${disabled} onclick="claim('${item}')">${btnText}</button>`;
        });
        document.getElementById('shopItems').innerHTML = html;
    }

    async function addNote(user) {
        const newCount = gameState[user].completed + 1;
        gameState[user].completed = newCount;
        updateUI();
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ user: user, newCount: newCount }) });
    }

    async function claim(itemName) {
        const user = prompt("Who is claiming this? Type 'userA' for Michael or 'userB' for Jacinta").trim();
        if (!gameState[user]) return;

        const currentPerc = (gameState[user].completed / gameState[user].total) * 100;
        if (currentPerc < 100) {
            alert("Nice try! You need 100% completion to claim an item.");
            return;
        }

        const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ user: user, newItem: itemName }) });
        const result = await response.text();

        if (result === "ALREADY_TAKEN") {
            alert("Item already claimed by someone else!");
        } else {
            alert(`${itemName} added to inventory!`);
        }
        syncData();
    }

    setInterval(syncData, 30000);
    syncData();
</script>
</body>
</html>
