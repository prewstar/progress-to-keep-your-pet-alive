<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Guardian: The Competition</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f0f2f5; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .user-card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .pet-sprite { width: 120px; height: 120px; object-fit: contain; margin: 10px auto; display: block; }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.7em; margin-bottom: 10px; }
        .status-happy { background: #55efc4; color: #00b894; }
        .status-tired { background: #ffeaa7; color: #fdcb6e; }
        .status-sick { background: #fab1a0; color: #e17055; }
        .status-coma { background: #a29bfe; color: #6c5ce7; }
        .progress-container { background: #eee; height: 25px; border-radius: 12px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.8s ease; }
        .backlog-section { margin-top: 15px; padding-top: 10px; border-top: 1px dashed #ccc; text-align: left; font-size: 0.85em; }
        .backlog-btn { background: #e0dbff; border: 1px solid var(--primary); padding: 4px 8px; border-radius: 4px; cursor: pointer; margin: 2px; }
        .shop-box { background: #2d3436; color: white; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: center; position: relative; }
        .item-wrapper { position: relative; display: inline-block; }
        .item-btn { background: #6c5ce7; border: none; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; margin: 5px; font-weight: bold; }
        .item-btn:disabled { background: #555; opacity: 0.6; }
        .tooltip-text { visibility: hidden; width: 160px; background-color: #fffa65; color: #333; text-align: center; border-radius: 10px; padding: 10px; position: absolute; z-index: 10; bottom: 125%; left: 50%; margin-left: -80px; opacity: 0; transition: opacity 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-weight: bold; border: 2px solid #333; font-size: 0.9em; line-height: 1.2; }
        .item-wrapper:hover .tooltip-text { visibility: visible; opacity: 1; }
        button.action-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        .claim-alert { background: #feca57; color: #2d3436; padding: 10px; border-radius: 8px; margin: 10px 0; font-weight: bold; cursor: pointer; border: 2px solid #ff9f43; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center;">🐾 Note Guardians</h1>
    <h3 id="weekHeading" style="text-align:center; color: #6c5ce7;">Syncing with Sheet...</h3>

    <div class="stats-grid">
        <div class="user-card">
            <img id="petA" class="pet-sprite" src="michael/happy.png">
            <div id="badgeA" class="status-badge status-happy">Status: Happy</div>
            <h3>Michael</h3>
            <div class="progress-container"><div id="barA" class="progress-fill"></div></div>
            <p id="txtA">0 / 0 (0%)</p>
            <button class="action-btn" onclick="addNote('userA', gameState.currentWeek)">+1 Current Note</button>
            <div id="claimA"></div>
            <div class="backlog-section">
                <strong>Overdue Notes:</strong>
                <div id="historyA">None! ✨</div>
            </div>
            <p id="invA" style="font-size: 0.8em; color: #666;">🎒 Items: None</p>
        </div>

        <div class="user-card">
            <img id="petB" class="pet-sprite" src="jacinta/happy.png">
            <div id="badgeB" class="status-badge status-happy">Status: Happy</div>
            <h3>Jacinta</h3>
            <div class="progress-container"><div id="barB" class="progress-fill"></div></div>
            <p id="txtB">0 / 0 (0%)</p>
            <button class="action-btn" onclick="addNote('userB', gameState.currentWeek)">+1 Current Note</button>
            <div id="claimB"></div>
            <div class="backlog-section">
                <strong>Overdue Notes:</strong>
                <div id="historyB">None! ✨</div>
            </div>
            <p id="invB" style="font-size: 0.8em; color: #666;">🎒 Items: None</p>
        </div>
    </div>

    <div class="shop-box">
        <h3 id="shopTitle">🎁 Weekly Reward Draft</h3>
        <div id="shopItems"></div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyAPSvmmBvpYmBcjUa1AhU3q8cIP-WlHCSwynSjWynBG6ED2bawA8DXl7fhagVdlrNu/exec";
    
    const DESCRIPTIONS = {
        "Tiny Sprout Hat": "🌱 A single green leaf that grows from their head.",
        "Over-sized Yellow Raincoat": "🧥 Complete with little matching boots.",
        "Star Sunglasses": "🕶️ For that celebrity-on-vacation look.",
        "Crocheted Scarf": "🧣 Long enough to trail slightly behind.",
        "Flower Crown": "🌸 Made of daisies that never wilt.",
        "Polka-Dot Bowtie": "🎀 Automatically straightens itself.",
        "Paper Bag Mask": "🎭 With a hand-drawn smiley face.",
        "Cardboard Armor": "🛡️ For the brave (but fragile) hero.",
        "Wings": "👼 Tiny fluttering attachments.",
        "Pom-Pom Beanie": "👒 Extra floppy and soft.",
        "Wind-up Mouse": "🐭 Zips around in circles.",
        "Glowing Jellyfish Lamp": "🏮 Hovers slightly off the ground.",
        "Miniature Train": "🚂 Just big enough for them to sit in.",
        "Squeaky Dino": "🦖 Makes a high-pitched mewp sound.",
        "Infinite Yarn": "🧶 Never unravels completely.",
        "Heart Bubbles": "🫧 Creates floating heart-shaped bubbles.",
        "Handheld Console": "🎮 A tiny device for your pet to play.",
        "Wooden Rocking Horse": "🎠 Perfectly sized for a ride.",
        "Bouncy Star Ball": "✨ Leaves a trail of glitter.",
        "Plushie of themselves": "🧸 For maximum meta-cuteness.",
        "Star-shaped Watermelon": "🍉 Tastes like summer.",
        "Firefly Honey": "🍯 Glows in the dark.",
        "Cotton Candy Cloud": "☁️ Occasionally drifts upward.",
        "Rainbow Macaron": "🍪 A different flavor in every bite.",
        "Strawberry Milk Box": "🥤 Complete with a tiny straw.",
        "Lucky Acorn": "🐿️ Polished to a high shine.",
        "Heart-shaped Jam Cookie": "🍓 Leaves a trail of crumbs.",
        "Moon-Cheese": "🧀 Mildly cratered and very savory.",
        "Sparkling Soda": "🍹 Causes the pet to emit tiny sparkles.",
        "Giant Sunflower Seed": "🌻 Hard to carry, but worth it.",
        "Mushroom Stool": "🍄 A cozy place to sit.",
        "Teacup Bed": "☕ Lined with silk pillows.",
        "Terrarium Globe": "🌍 A tiny ecosystem in a glass ball.",
        "Ghost Plant": "🌿 A translucent, friendly-looking fern.",
        "Record Player": "🎶 Plays lo-fi beats for sleeping.",
        "Fairy Lights": "🏮 Drapes over anything they own.",
        "Beanbag Chair": "💺 Takes the exact shape of the pet.",
        "Polaroid": "📸 Of the pet and its owner!",
        "No-prick Cactus": "🌵 It’s actually quite fuzzy.",
        "Cloud Rug": "☁️ Feels like walking on air.",
        "Stardust": "✨ Change the pet's color temporarily.",
        "Antique Key": "🔑 No one knows what it opens yet.",
        "Ever-Burning Candle": "🕯️ Smells like vanilla and old books.",
        "Message in a Bottle": "🍾 Contains a random compliment.",
        "Pocket Sun": "☀️ Keeps the pet warm on rainy days.",
        "Crystal Geode": "💎 Sparkles when the pet is happy.",
        "Phoenix Feather": "🪶 Warm to the touch.",
        "Compass that points to snacks": "🧭 Always reliable.",
        "Enchanted Umbrella": "☂️ Floats over them automatically.",
        "Golden Ticket": "🎟️ A pass to a future Secret Garden."
    };

    const DATABASE = {
        "Wearables": ["Tiny Sprout Hat", "Over-sized Yellow Raincoat", "Star Sunglasses", "Crocheted Scarf", "Flower Crown", "Polka-Dot Bowtie", "Paper Bag Mask", "Cardboard Armor", "Wings", "Pom-Pom Beanie"],
        "Toys": ["Wind-up Mouse", "Glowing Jellyfish Lamp", "Miniature Train", "Squeaky Dino", "Infinite Yarn", "Heart Bubbles", "Handheld Console", "Wooden Rocking Horse", "Bouncy Star Ball", "Plushie of themselves"],
        "Snacks": ["Star-shaped Watermelon", "Firefly Honey", "Cotton Candy Cloud", "Rainbow Macaron", "Strawberry Milk Box", "Lucky Acorn", "Heart-shaped Jam Cookie", "Moon-Cheese", "Sparkling Soda", "Giant Sunflower Seed"],
        "Decor": ["Mushroom Stool", "Teacup Bed", "Terrarium Globe", "Ghost Plant", "Record Player", "Fairy Lights", "Beanbag Chair", "Polaroid", "No-prick Cactus", "Cloud Rug"],
        "Rare": ["Stardust", "Antique Key", "Ever-Burning Candle", "Message in a Bottle", "Pocket Sun", "Crystal Geode", "Phoenix Feather", "Compass that points to snacks", "Enchanted Umbrella", "Golden Ticket"]
    };

    let gameState = null;
    let viewingWeek = null;

    async function syncData() {
        try {
            const response = await fetch(API_URL);
            gameState = await response.json();
            // Default view to current week if not looking at a backlog
            if(!viewingWeek) viewingWeek = gameState.currentWeek;
            updateUI();
        } catch (e) { console.log("Sync failed"); }
    }

    function updateUI() {
        if(!gameState || !gameState.userA || !gameState.userB) return;

        ['userA', 'userB'].forEach(u => {
            const id = (u === 'userA') ? 'A' : 'B';
            const user = gameState[u];
            
            // Current Progress (Main Bar)
            const current = user.history.find(h => Number(h.week) === Number(gameState.currentWeek));
            if (current) {
                const perc = (Number(current.completed) / Number(current.total)) * 100 || 0;
                document.getElementById('bar' + id).style.width = perc + "%";
                document.getElementById('txt' + id).innerText = `${current.completed} / ${current.total} (${perc.toFixed(0)}%)`;
            }

            // Inventory (Sum of all claimed items)
            const allItems = user.history.map(h => h.claimedItem).filter(i => i);
            document.getElementById('inv' + id).innerText = "🎒 Items: " + (allItems.join(", ") || "None");
            
            // Sprite & Badge
            const folder = (id === 'A') ? 'michael' : 'jacinta';
            document.getElementById('pet' + id).src = `${folder}/${user.status}.png`;
            document.getElementById('badge' + id).innerText = "Status: " + user.status;
            document.getElementById('badge' + id).className = `status-badge status-${user.status}`;

            // Backlog and Claim Alerts
            let backHTML = "";
            let claimAlert = "";
            user.history.sort((a,b) => Number(a.week) - Number(b.week)).forEach(h => {
                const isDone = Number(h.completed) >= Number(h.total);
                const wNum = Number(h.week);
                
                if (!isDone && wNum < Number(gameState.currentWeek)) {
                    let d = new Date(h.date);
                    backHTML += `<button class="backlog-btn" onclick="addNote('${u}', ${wNum})">Week ${wNum} (${d.getDate()}/${d.getMonth()+1}) (+1) ${h.completed}/${h.total}</button><br>`;
                }
                
                // Show claim alert if week is done but no item is recorded
                // Limited to current week and 1 week prior
                if (isDone && !h.claimedItem && (wNum === Number(gameState.currentWeek) || wNum === Number(gameState.currentWeek) - 1)) {
                    claimAlert += `<div class="claim-alert" onclick="setShop(${wNum})">🎁 Claim Week ${wNum} Reward!</div>`;
                }
            });
            document.getElementById('history' + id).innerHTML = backHTML || "All caught up! ✨";
            document.getElementById('claim' + id).innerHTML = claimAlert;
        });

        renderShop();
    }

    function setShop(weekID) {
        viewingWeek = weekID;
        updateUI();
    }

    function renderShop() {
        const catList = ["Wearables", "Toys", "Snacks", "Decor", "Rare"];
        const currentCat = catList[(Number(viewingWeek) - 1) % 5];
        document.getElementById('shopTitle').innerText = `🎁 Week ${viewingWeek} Reward Draft (${currentCat})`;

        let allItems = [...DATABASE[currentCat]];
        let seed = Number(viewingWeek);
        let shuffled = allItems.sort(() => {
            const hash = (seed * 9301 + 49297) % 233280;
            seed = hash;
            return (hash / 233280) - 0.5;
        });

        const weeklyItems = shuffled.slice(0, 3);
        let html = "";
        
        // Find if any items are sold out for THIS specific week
        const weekClaims = [
            gameState.userA.history.find(h => Number(h.week) === Number(viewingWeek))?.claimedItem,
            gameState.userB.history.find(h => Number(h.week) === Number(viewingWeek))?.claimedItem
        ];

        weeklyItems.forEach(item => {
            const isSold = weekClaims.includes(item);
            const tooltip = DESCRIPTIONS[item] || "A special item!";
            html += `
                <div class="item-wrapper">
                    <button class="item-btn" ${isSold ? 'disabled' : ''} onclick="claim('${item}')">
                        ${isSold ? item + ' (Claimed)' : item}
                    </button>
                    <span class="tooltip-text">${tooltip}</span>
                </div>`;
        });
        document.getElementById('shopItems').innerHTML = html;
    }

    async function addNote(user, weekID) {
        const userHist = gameState[user].history;
        const weekData = userHist.find(h => Number(h.week) === Number(weekID));
        if(!weekData) return;
        
        weekData.completed++;
        updateUI();
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ user, weekID, newCount: weekData.completed }) });
    }

    async function claim(itemName) {
        const user = prompt("Who is claiming? (userA for Michael / userB for Jacinta)").trim();
        if (!gameState[user]) return;
        const weekData = gameState[user].history.find(h => Number(h.week) === Number(viewingWeek));
        
        if (Number(weekData.completed) < Number(weekData.total)) {
            return alert("Finish that week's notes first!");
        }
        
        const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ user, weekID: viewingWeek, newItem: itemName }) });
        const result = await resp.text();
        if(result === "ALREADY_TAKEN") alert("Too slow! Your opponent already claimed this one.");
        
        syncData();
    }

    syncData();
    setInterval(syncData, 30000);
</script>
</body>
</html>
